services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: webservice
      POSTGRES_USER: webuser
      POSTGRES_PASSWORD: webpass
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U webuser -d webservice"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth-service:
    build: ./services/auth-service
    restart: unless-stopped
    environment:
      NODE_ENV: development
      JWT_SECRET: ${JWT_SECRET:-changeme}
      PORT: 4001
      DATABASE_URL: postgres://webuser:webpass@postgres:5432/webservice
    ports:
      - "4001:4001"
    depends_on:
      postgres:
        condition: service_healthy

  incident-service:
    build: ./services/incident-service
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 4003
      DATABASE_URL: postgres://webuser:webpass@postgres:5432/webservice
    ports:
      - "4003:4003"
    depends_on:
      postgres:
        condition: service_healthy

  notification-service:
    build: ./services/notification-service
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 4004
      DATABASE_URL: postgres://webuser:webpass@postgres:5432/webservice
    ports:
      - "4004:4004"
    depends_on:
      postgres:
        condition: service_healthy

  vehicle-service:
    build: ./services/vehicle-service
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 4002
      DATABASE_URL: postgres://webuser:webpass@postgres:5432/webservice
    ports:
      - "4002:4002"
    depends_on:
      postgres:
        condition: service_healthy

  traffic-service:
    build: ./services/traffic-service
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 4005
      DATABASE_URL: postgres://webuser:webpass@postgres:5432/webservice
    ports:
      - "4005:4005"
    depends_on:
      postgres:
        condition: service_healthy

  gateway:
    build: ./gateway
    restart: unless-stopped
    environment:
      NODE_ENV: development
      AUTH_SERVICE_URL: http://auth-service:4001
      INCIDENT_SERVICE_URL: http://incident-service:4003
      NOTIFICATION_SERVICE_URL: http://notification-service:4004
      VEHICLE_SERVICE_URL: http://vehicle-service:4002
      TRAFFIC_SERVICE_URL: http://traffic-service:4005
      JWT_SECRET: ${JWT_SECRET:-changeme}
      PORT: 4000
    ports:
      - "4000:4000"
    depends_on:
      auth-service:
        condition: service_started
      incident-service:
        condition: service_started
      notification-service:
        condition: service_started
      vehicle-service:
        condition: service_started
      traffic-service:
        condition: service_started

volumes:
  db-data:
